services:
  mysql:
    image: mysql:8.0
    container_name: lab04_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppassword123
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - lab04_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword123"]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    build:
      context: ./wordpress
    container_name: lab04_wordpress
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wppassword123
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_DEBUG: 0
    volumes:
      - wp_data:/var/www/html
    networks:
      - lab04_net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: lab04_nginx
    depends_on:
      - wordpress
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./landing/index.html:/var/www/landing/index.html:ro
    networks:
      - lab04_net
    restart: unless-stopped

volumes:
  mysql_data:
  wp_data:

networks:
  lab04_net:
    driver: bridge
